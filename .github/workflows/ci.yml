name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  validate-addon:
    name: Validate add-on config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate homebox/config.json
        run: |
          python3 -c "
          import json, sys
          cfg = json.load(open('homebox/config.json'))
          required = ['name', 'version', 'slug', 'description', 'startup', 'boot', 'options', 'schema']
          missing = [f for f in required if f not in cfg]
          if missing:
              print(f'Missing fields: {missing}', file=sys.stderr); sys.exit(1)
          assert 'ports' not in cfg or all('/' in k for k in cfg['ports']), 'ports keys must be <port>/tcp'
          print('homebox/config.json OK')
          "
      - name: Validate repository.json
        run: python3 -c "import json; json.load(open('repository.json')); print('repository.json OK')"
      - name: Validate manifest.json
        run: python3 -c "import json; m=json.load(open('custom_components/homebox/manifest.json')); assert m['domain']=='homebox'; print('manifest.json OK')"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check custom_components/ tests/

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short

  bump-version:
    name: Auto-bump patch version
    runs-on: ubuntu-latest
    # Only bump on direct pushes to master/main — never on PRs or version-bump commits
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [validate-addon, lint, test]
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version in both config files
        id: bump
        run: |
          OLD=$(python3 -c "import json; print(json.load(open('homebox/config.json'))['version'])")

          python3 - "$OLD" <<'PYEOF'
          import json, sys

          def bump_patch(v):
              parts = v.split(".")
              parts[-1] = str(int(parts[-1]) + 1)
              return ".".join(parts)

          old = sys.argv[1]
          new = bump_patch(old)

          for path in ("homebox/config.json", "custom_components/homebox/manifest.json"):
              with open(path) as f:
                  data = json.load(f)
              data["version"] = new
              with open(path, "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")

          print(f"Bumped {old} -> {new}")
          PYEOF

          NEW=$(python3 -c "import json; print(json.load(open('homebox/config.json'))['version'])")
          echo "old_version=$OLD" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebox/config.json custom_components/homebox/manifest.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}

  publish:
    name: Build & Push Docker image to GHCR
    runs-on: ubuntu-latest
    # Runs in the same CI workflow as bump-version — GITHUB_TOKEN pushes never
    # trigger a new workflow run, so we can't rely on the bump commit for this.
    # Uses needs.bump-version.outputs.new_version so the image tag matches
    # the version just written to config.json.
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 runtime layer)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./homebox
          file: ./homebox/Dockerfile
          # Stages 1-3 run native on amd64 (Go cross-compiles; JS is arch-agnostic).
          # Only the final Alpine runtime layer uses QEMU for arm64.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/amantux/ha-homebox-addon/homebox:${{ needs.bump-version.outputs.new_version }}
            ghcr.io/amantux/ha-homebox-addon/homebox:latest

      - name: Make GHCR package public
        run: |
          gh api --method PATCH \
            /user/packages/container/ha-homebox-addon%2Fhomebox \
            -f visibility=public || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
