name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  validate-addon:
    name: Validate add-on config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate homebox/config.json
        run: |
          python3 -c "
          import json, sys
          cfg = json.load(open('homebox/config.json'))
          required = ['name', 'version', 'slug', 'description', 'startup', 'boot', 'options', 'schema']
          missing = [f for f in required if f not in cfg]
          if missing:
              print(f'Missing fields: {missing}', file=sys.stderr); sys.exit(1)
          assert 'ports' not in cfg or all('/' in k for k in cfg['ports']), 'ports keys must be <port>/tcp'
          print('homebox/config.json OK')
          "
      - name: Validate repository.json
        run: python3 -c "import json; json.load(open('repository.json')); print('repository.json OK')"
      - name: Validate manifest.json
        run: python3 -c "import json; m=json.load(open('custom_components/homebox/manifest.json')); assert m['domain']=='homebox'; print('manifest.json OK')"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check custom_components/ tests/

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short

  bump-version:
    name: Auto-bump patch version
    runs-on: ubuntu-latest
    # Only bump on direct pushes to master/main — never on PRs or version-bump commits
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [validate-addon, lint, test]
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version in both config files
        id: bump
        run: |
          OLD=$(python3 -c "import json; print(json.load(open('homebox/config.json'))['version'])")

          python3 - "$OLD" <<'PYEOF'
          import json, sys

          def bump_patch(v):
              parts = v.split(".")
              parts[-1] = str(int(parts[-1]) + 1)
              return ".".join(parts)

          old = sys.argv[1]
          new = bump_patch(old)

          for path in ("homebox/config.json", "custom_components/homebox/manifest.json"):
              with open(path) as f:
                  data = json.load(f)
              data["version"] = new
              with open(path, "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")

          print(f"Bumped {old} -> {new}")
          PYEOF

          NEW=$(python3 -c "import json; print(json.load(open('homebox/config.json'))['version'])")
          echo "old_version=$OLD" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebox/config.json custom_components/homebox/manifest.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.old_version }} → ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}

  # ── Build: one native job per platform ──────────────────────────────────────
  # ubuntu-latest = amd64 runner; ubuntu-24.04-arm = native arm64 runner (free
  # for public repos). Each runner builds its own image natively — no QEMU,
  # no cross-compilation, no ARG injection issues.
  publish:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version]
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        with:
          context: ./homebox
          file: ./homebox/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # Per-platform tags; merged into multi-arch manifest by next job.
          tags: |
            ghcr.io/amantux/ha-homebox-addon:${{ needs.bump-version.outputs.new_version }}-${{ matrix.arch }}
            ghcr.io/amantux/ha-homebox-addon:latest-${{ matrix.arch }}

  # ── Merge: combine per-platform images into a single multi-arch manifest ───
  merge-manifest:
    name: Merge multi-arch manifest
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    needs: [bump-version, publish]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ needs.bump-version.outputs.new_version }}
          docker buildx imagetools create \
            --tag ghcr.io/amantux/ha-homebox-addon:${VERSION} \
            --tag ghcr.io/amantux/ha-homebox-addon:latest \
            ghcr.io/amantux/ha-homebox-addon:${VERSION}-amd64 \
            ghcr.io/amantux/ha-homebox-addon:${VERSION}-arm64
          echo "✅ Multi-arch manifest created for ${VERSION}"

      - name: Make GHCR package public
        run: |
          if [ -z "$GHCR_PAT" ]; then
            echo "::warning::GHCR_PAT secret not set — cannot auto-set visibility."
            echo "::warning::Go to: https://github.com/users/Amantux/packages/container/ha-homebox-addon/settings"
            exit 0
          fi
          gh api --method PATCH \
            /user/packages/container/ha-homebox-addon \
            -f visibility=public \
          && echo "✅ GHCR package set to public" \
          || echo "::warning::API call failed — manually set at: https://github.com/users/Amantux/packages/container/ha-homebox-addon/settings"
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}

