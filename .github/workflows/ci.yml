name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  validate-addon:
    name: Validate add-on config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate config.json
        run: python -c "import json, sys; cfg=json.load(open('config.json')); assert 'name' in cfg and 'version' in cfg, 'Missing required fields'; print('config.json OK')"
      - name: Validate repository.json
        run: python -c "import json; json.load(open('repository.json')); print('repository.json OK')"
      - name: Validate manifest.json
        run: python -c "import json; m=json.load(open('custom_components/homebox/manifest.json')); assert m['domain']=='homebox'; print('manifest.json OK')"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check custom_components/ tests/

  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short
